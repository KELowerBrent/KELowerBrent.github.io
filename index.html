<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brent River Park</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<link rel="stylesheet" href="style.css">

</head>

<body>
 <div id="header">
    <img src="download.png" alt="download" id="download"> 
    <span id="title">Brent River Park</span>
    </div>
<div id="container">

    <div id="map"></div>

    <div id="info">

        <h2>About the project:</h2>
        <p>Web-based Geospatial Database to Support 
Environmental Regeneration in Brent River Park.</p>  
         <a href="Brent_River_Park.pdf" target="_blank">
            Open Project Information
        </a>

        <table>

            <tr>
                <td>Latitude</td>
                <td id="lat">-</td>
            </tr>

            <tr>
                <td>Longitude</td>
                <td id="lng">-</td>
            </tr>

            <tr>
                <td>Raster Value</td>
                <td id="value">-</td>
            </tr>

        </table>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/georaster/dist/georaster.browserify.min.js"></script>

<script src="https://unpkg.com/georaster-layer-for-leaflet/dist/georaster-layer-for-leaflet.min.js"></script>


<script src="app.js"></script>

</body>
</html>
