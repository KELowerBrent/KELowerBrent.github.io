<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Dual Column App</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="app-container">
        <!-- Left Section: Information Panel (60%) -->
        <section class="info-column">
            <h2>Data Information Panel</h2>
            
            <div class="data-card">
                <h3>GeoTIFF Metadata</h3>
                <div id="tiff-info">Loading GeoTIFF metrics...</div>
            </div>

            <div class="data-card">
                <h3>GeoJSON Properties</h3>
                <div id="json-info">Click a vector feature on the map to see details.</div>
            </div>
        </section>

        <!-- Right Section: Map Layout (40%) -->
        <section class="map-column">
            <div id="map"></div>
        </section>
    </div>

    <!-- Leaflet Engine JS -->
    <script src="https://unpkg.com"></script>
    <!-- Dependencies for parsing GeoTIFF rasters in client browser -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com-layer-for-leaflet"></script>
    <!-- Core Application Logic -->
    <script src="app.js"></script>
</body>
</html>
