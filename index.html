<body>
 <div id="header">
    <img src="download.png" alt="download" id="download"> 
    <span id="title" style="font-size: 24px; font-weight: bold;">Brent River Park</span>
    </div>
<div id="container">

    <div id="map"></div>

    <div id="info">

        <h2>About the project:</h2>
        <p>Web-based Geospatial Database to Support 
Environmental Regeneration in Brent River Park.</p>  
         <a href="Brent_River_Park.pdf" target="_blank">
            Open Project Information
        </a>
<div class="table-container">
        <table>

            <tr>
                <td>Latitude</td>
                <td id="lat">-</td>
            </tr>

            <tr>
                <td>Longitude</td>
                <td id="lng">-</td>
            </tr>

            <tr>
                <td>LST 2017 (°C)</td>
                <td id="value_1">-</td>
            </tr>

          <tr>
                <td>LST 2026 (°C)</td>
                <td id="value_2">-</td>
            </tr>

         <tr>
                <td>Difference (°C)</td>
                <td id="value_">-</td>
            </tr>
         <tr> 
         </tr>
        </table>
    </div>
 
<div class="table-container">
    <table class="horizontal-table">
        <thead>
            <tr>
                <th>LULC 2016 Class</th>
                <th>LULC 2026 Class</th>
                <th>Land Cover Information</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="value_3" class="lulc-cell">-</td>
                <td id="value_4" class="lulc-cell">-</td>
                <td id="value_5" class="transition-cell">-</td>
            </tr>
        </tbody>
    </table>
</div>
        </tbody>
    </table>
</div>
        </table>

    </div>

</div>
